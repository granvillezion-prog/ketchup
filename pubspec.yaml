name: ketchup
description: "Know No Know prototype."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.4
  flutter_contacts: ^1.1.9
  url_launcher: ^6.3.0
  flutter_animate: ^4.5.0

  # Firebase
  firebase_core: ^3.5.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # App launcher icons
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/app_icon_work.png

flutter_icons:
  android: true
  ios: true
  image_path: "assets/app_icon_work.png"
  min_sdk_android: 21
  remove_alpha_ios: true

